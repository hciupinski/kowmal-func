name: Blob storage website CI

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/main_kowmal-func_web.yml'
      - 'web/**'
  workflow_dispatch:

env:
  CI: false
  STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
  CDN_PROFILE_NAME: ${{ secrets.AZURE_CDN_PROFILE_NAME }}
  CDN_ENDPOINT_NAME: ${{ secrets.AZURE_CDN_ENDPOINT_NAME }}
  CDN_RESOURCE_GROUP: ${{ secrets.AZURE_CDN_RESOURCE_GROUP }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      
    steps:
      - uses: actions/checkout@v3
        
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2B76C5A14562403885D258E206B857BD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4F74DCD3C03E440B8474635E87C840B4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4BEF95AE5923441795F0412419210AAA }}

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Build website
        working-directory: ./web
        run: |
          npm install
          npm run build

      - name: Validate Azure target resources
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage account show --name "$STORAGE_ACCOUNT_NAME" --query "id" -o tsv

      - name: Upload to blob storage
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage blob upload-batch --account-name "$STORAGE_ACCOUNT_NAME" --auth-mode login -d '$web' -s ./web/build --overwrite
       
      - name: Purge CDN endpoint
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az cdn endpoint purge --content-paths "/*" --profile-name "$CDN_PROFILE_NAME" --name "$CDN_ENDPOINT_NAME" --resource-group "$CDN_RESOURCE_GROUP"
      
      # Azure logout
      - name: logout
        run: |
          az logout
        if: always()
